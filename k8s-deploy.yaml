# MCP Admin GUI K8s Deployment Manifests
# Deploy to kasim-odoo namespace (same as MCP servers)
---
# RBAC: ServiceAccount with namespace-scoped access
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-admin-sa
  namespace: kasim-odoo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mcp-admin-role
  namespace: kasim-odoo
rules:
- apiGroups: [""]
  resources: ["secrets", "configmaps"]
  verbs: ["get", "list", "patch", "update"]
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mcp-admin-binding
  namespace: kasim-odoo
subjects:
- kind: ServiceAccount
  name: mcp-admin-sa
  namespace: kasim-odoo
roleRef:
  kind: Role
  name: mcp-admin-role
  apiGroup: rbac.authorization.k8s.io
---
# Odoo MCP Admin (port 9001)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: odoo-mcp-admin
  namespace: kasim-odoo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: odoo-mcp-admin
  template:
    metadata:
      labels:
        app: odoo-mcp-admin
    spec:
      serviceAccountName: mcp-admin-sa
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"
      containers:
      - name: admin
        image: jcr-prod.woowtech.io/woow-paas-docker-local/odoo-mcp-admin:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 9001
        env:
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: ADMIN_SECRET_NAME
          value: kasim-postgres-secret
        - name: MCP_DEPLOY_NAME
          value: mcp-odoo
        - name: MCP_PROXY_DEPLOY_NAME
          value: mcp-odoo-proxy
        - name: MCP_SECRET_NAME
          value: mcp-odoo-secrets
        - name: MCP_PROXY_CONFIG_NAME
          value: mcp-odoo-proxy-config
        - name: ODOO_SVC_URL
          value: http://kasim-odoo-svc:8069
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        readinessProbe:
          httpGet:
            path: /healthz
            port: 9001
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: 9001
          initialDelaySeconds: 15
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: odoo-mcp-admin-svc
  namespace: kasim-odoo
spec:
  selector:
    app: odoo-mcp-admin
  ports:
  - port: 9001
    targetPort: 9001
---
# n8n MCP Admin (port 9002)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n-mcp-admin
  namespace: kasim-odoo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: n8n-mcp-admin
  template:
    metadata:
      labels:
        app: n8n-mcp-admin
    spec:
      serviceAccountName: mcp-admin-sa
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"
      containers:
      - name: admin
        image: jcr-prod.woowtech.io/woow-paas-docker-local/n8n-mcp-admin:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 9002
        env:
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: ADMIN_SECRET_NAME
          value: n8n-secrets
        - name: MCP_DEPLOY_NAME
          value: n8n-mcp
        - name: MCP_PROXY_DEPLOY_NAME
          value: n8n-mcp-proxy
        - name: MCP_SECRET_NAME
          value: n8n-secrets
        - name: MCP_PROXY_CONFIG_NAME
          value: n8n-mcp-proxy-config
        - name: N8N_SVC_URL
          value: http://n8n.kasim-odoo.svc.cluster.local:5678
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        readinessProbe:
          httpGet:
            path: /healthz
            port: 9002
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: 9002
          initialDelaySeconds: 15
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: n8n-mcp-admin-svc
  namespace: kasim-odoo
spec:
  selector:
    app: n8n-mcp-admin
  ports:
  - port: 9002
    targetPort: 9002
