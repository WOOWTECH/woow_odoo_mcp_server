# Odoo MCP Admin GUI — Kubernetes Deployment（namespace：kasim-odoo）
#
# 共用 RBAC（ServiceAccount / Role / RoleBinding）已抽到 k8s-rbac.yaml，
# 每個 namespace 先套用一次後再套用本檔：
#     kubectl apply -f k8s-rbac.yaml
#     kubectl apply -f k8s-deploy.yaml
#
# 注意：本檔只負責 odoo-mcp-admin 自己的 Deployment/Service；n8n-mcp-admin
# 由 woow_n8n_mcp_server/k8s-deploy.yaml 各自管理，互不影響。
---
# Odoo MCP Admin (port 9001)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: odoo-mcp-admin
  namespace: kasim-odoo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: odoo-mcp-admin
  template:
    metadata:
      labels:
        app: odoo-mcp-admin
    spec:
      serviceAccountName: mcp-admin-sa
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"
      containers:
      - name: admin
        image: jcr-prod.woowtech.io/woow-paas-docker-local/odoo-mcp-admin:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 9001
        env:
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: ADMIN_SECRET_NAME
          value: kasim-postgres-secret
        - name: MCP_DEPLOY_NAME
          value: mcp-odoo
        - name: MCP_PROXY_DEPLOY_NAME
          value: mcp-odoo-proxy
        - name: MCP_SECRET_NAME
          value: mcp-odoo-secrets
        - name: MCP_PROXY_CONFIG_NAME
          value: mcp-odoo-proxy-config
        - name: ODOO_SVC_URL
          value: http://kasim-odoo-svc:8069
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        readinessProbe:
          httpGet:
            path: /healthz
            port: 9001
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: 9001
          initialDelaySeconds: 15
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: odoo-mcp-admin-svc
  namespace: kasim-odoo
spec:
  selector:
    app: odoo-mcp-admin
  ports:
  - port: 9001
    targetPort: 9001
